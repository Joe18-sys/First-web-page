<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Agencia Tu Futuro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Registrarse-style.css">
</head>

<body>

    <div class="registro-card">
        <h2>Crea tu Cuenta</h2>
        <p>Únete a la mejor experiencia de viaje</p>
        
        <form>
            <input type="text" placeholder="Nombre Completo" required>
            <input type="email" placeholder="Correo Electrónico" required>
            <input type="text" placeholder="Nombre de Usuario" required>
            <input type="password" placeholder="Contraseña" required>
            <input type="password" placeholder="Confirmar Contraseña" required>
            
            <button type="submit" class="btn-registro">Registrarme ahora</button>
        </form>
        
        <a href="login.html" class="link-volver">¿Ya tienes cuenta? Inicia Sesión</a>
    </div>

    <script src="Registrarse-script.js"></script>

</body>
</html>
