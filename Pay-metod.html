<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Pago - Registro de Viaje</title>
    <link rel="stylesheet" href="Pay-metod.css">
</head>
<body>

    <section id="pago">
        <a href="registro.html" class="link-back">← Volver al registro</a>
        
        <h2>Finalizar Compra</h2>
        
        <form id="payment-form">
            <div class="input-group">
                <label>Nombre del Titular</label>
                <input type="text" placeholder="Ej. Juan Pérez" required>
            </div>

            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" placeholder="usuario@gmail.com" required>
            </div>

            <div class="input-group">
                <label>Número de tarjeta</label>
                <input type="text" inputmode="numeric" pattern="[0-9]{16}" maxlength="16" placeholder="1234567890123456" required>
            </div>
            
            <div class="input-row">
                <div class="input-group-half">
                    <label>Expiración</label>
                    <input type="text"  placeholder="MM/AA" maxlength="5" pattern="(0[1-9]|1[0-2])\/[0-9]{2}" title="Usa el formato MM/AA (ej. 05/26)" required>
                </div>
                <div class="input-group-half">
                    <label>CVC/CVV</label>
                    <input type="password" placeholder="123" maxlength="3" required>
                </div>
            </div>
            
            <button type="submit" class="btn-pagar">Pagar Ahora</button>
        </form>
    </section>

    <script>
        document.getElementById('payment-form').onsubmit = function(e) {
            e.preventDefault();
            const email = document.querySelector('input[type="email"]').value;
            alert("¡Pago procesado con éxito! Hemos enviado los detalles a: " + email);
            window.location.href = "index.html"; 
        };

        const expInput = document.querySelector('input[placeholder="MM/AA"]');

        expInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, ''); 
         if (value.length > 2) {
            e.target.value = value.substring(0, 2) + '/' + value.substring(2, 4);
            } else {
         e.target.value = value;
         }
        });

    </script>
</body>
</html>
